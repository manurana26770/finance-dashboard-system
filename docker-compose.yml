services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance-dashboard-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dashboard-api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/api/v1',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dashboard-seed
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "db", "seed"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
